<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Luma — Beauty Concierge</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f0eb;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .chat-container {
      width: 420px;
      height: 680px;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      background: #1a1a1a;
      color: #fff;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 40px;
      height: 40px;
      background: #c9a96e;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .header-info h2 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .header-info p {
      font-size: 12px;
      color: #aaa;
      margin-top: 2px;
    }

    .client-toggle {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #aaa;
    }

    .client-toggle input {
      cursor: pointer;
      accent-color: #c9a96e;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .message.user {
      background: #1a1a1a;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .message.agent {
      background: #f5f0eb;
      color: #1a1a1a;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .message.agent.typing {
      color: #999;
      font-style: italic;
    }

    .input-area {
      padding: 16px;
      border-top: 1px solid #f0ebe4;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      border: 1px solid #e0d8cf;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      max-height: 100px;
      background: #faf7f4;
      color: #1a1a1a;
    }

    textarea:focus {
      border-color: #c9a96e;
    }

    button {
      background: #c9a96e;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    button:hover { background: #b8935a; }
    button:disabled { background: #ddd; cursor: not-allowed; }

    .session-info {
      padding: 6px 16px;
      font-size: 11px;
      color: #bbb;
      background: #faf7f4;
      border-top: 1px solid #f0ebe4;
    }
  </style>
</head>
<body>

<div class="chat-container">
  <div class="chat-header">
    <div class="avatar">✦</div>
    <div class="header-info">
      <h2>Luma</h2>
      <p>Beauty & Wellness Concierge</p>
    </div>
    <div class="client-toggle">
      <label for="clientMode">Client mode</label>
      <input type="checkbox" id="clientMode" />
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="message agent">
      Hello! I'm Luma, your beauty concierge. I can help you book appointments,
      check availability, or answer any questions about our services. How can I help you today?
    </div>
  </div>

  <div class="session-info" id="sessionInfo">Session: new</div>

  <div class="input-area">
    <textarea
      id="input"
      placeholder="Type a message..."
      rows="1"
      onkeydown="handleKey(event)"
    ></textarea>
    <button id="sendBtn" onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
  // Demo client ID — matches our seeded demo client Sarah Al Mansoori
  const DEMO_CLIENT_ID = 'f1111111-0001-0001-0001-000000000001';

  let sessionId = null;
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const sessionInfoEl = document.getElementById('sessionInfo');
  const clientModeEl = document.getElementById('clientMode');

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function addMessage(text, role) {
    const div = document.createElement('div');
    div.className = `message ${role}`;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = '';
    sendBtn.disabled = true;
    addMessage(text, 'user');

    const typingEl = addMessage('Luma is typing...', 'agent typing');

    try {
      const body = {
        message: text,
        session_id: sessionId,
      };

      // If client mode is on, pass the demo client ID
      if (clientModeEl.checked) {
        body.client_id = DEMO_CLIENT_ID;
      }

      const res = await fetch('http://localhost:8000/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });

      const data = await res.json();
      sessionId = data.session_id;
      sessionInfoEl.textContent = `Session: ${sessionId.slice(0, 8)}... | ${clientModeEl.checked ? '👤 Client' : '🔓 Visitor'}`;

      typingEl.remove();
      addMessage(data.response, 'agent');

    } catch (err) {
      typingEl.remove();
      addMessage('Something went wrong. Please try again.', 'agent');
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }
</script>

</body>
</html>
